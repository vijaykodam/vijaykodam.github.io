<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Classic Paint · Tesla Wrap Maker</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #0b0d12; color: #f4f6fb; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #232838; background: #161a23; }
  header a.back { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: inherit; border-radius: 12px; background: #1c2231; font-size: 22px; }
  header h1 { margin: 0; font-size: 20px; flex: 1; }
  header .hint { opacity: 0.65; font-size: 13px; max-width: 520px; }
  iframe { width: 100%; height: calc(100% - 80px); border: 0; background: #008080; }
</style>
</head>
<body>
  <header>
    <a id="back" class="back" href="../" aria-label="Back to home">&larr;</a>
    <h1>Classic Paint</h1>
    <p class="hint">JS Paint (MIT-licensed MS Paint clone). Use Image &rarr; Attributes... to set 1024 × 1024, then File &rarr; Save As to export a PNG. Drop it in your USB <code>Wraps</code> folder.</p>
  </header>
  <iframe src="https://jspaint.app/?eraser-tool=true" title="JS Paint" sandbox="allow-scripts allow-same-origin allow-downloads allow-popups allow-forms"></iframe>
  <script src="../shared/models.js?v=3"></script>
  <script>
    (async () => {
      try {
        const id = await TeslaModels.resolveModel();
        document.getElementById('back').href = TeslaModels.buildHref('../', id);
      } catch (_) { /* ignore */ }
    })();
  </script>
</body>
</html>
